name: kerroinseuranta
on:
  schedule: [ { cron: '*/5 * * * *' } ]
  workflow_dispatch:
    inputs:
      debug_selectors:
        description: 'Run selector debug mode (yes/no)'
        required: false
        default: 'no'
concurrency:
  group: kerroinseuranta
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore DB
        uses: actions/cache@v4.2.3
        with:
          path: events.db
          key: events-db-${{ github.run_id }}
          restore-keys: events-db-

      - run: pip install -r requirements.txt

      - name: Debug API structures
        if: ${{ github.event.inputs.debug_selectors == 'yes' }}
        run: python debug_selectors.py

      - name: Run
        if: ${{ github.event.inputs.debug_selectors != 'yes' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"username":"NHL Moneyline Bot","content":"⚠️ kerroinseuranta workflow epäonnistui"}'
