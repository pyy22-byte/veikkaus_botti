name: kerroinseuranta
on:
  schedule: [ { cron: '*/5 * * * *' } ]
  workflow_dispatch:
concurrency:
  group: kerroinseuranta
  cancel-in-progress: true
jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: events.db
          key: events-db-${{ github.run_id }}
          restore-keys: events-db-

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps

      - name: Run
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_CHAT_ID: ${{ secrets.DISCORD_CHAT_ID }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"username":"NHL Moneyline Bot","content":"⚠️ kerroinseuranta workflow epäonnistui"}'
